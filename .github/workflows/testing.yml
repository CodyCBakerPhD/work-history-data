name: Testing

on:
  pull_request:

env:
  GITHUB_TOKEN: ${{ secrets._GITHUB_API_KEY }}

jobs:
  Testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Install
        run: pip install -e .

      - name: Run tests
        run: pytest
