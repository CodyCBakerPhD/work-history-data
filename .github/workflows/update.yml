name: Update

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets._GITHUB_API_KEY }}
  REPO_OWNER: ${{ github.repository_owner }}
  REPO_OWNER_TYPE: ${{ github.event.repository.owner.type }}
  HISTORIA_USERNAME: ${{ github.repository_owner }}
  REPO_NAME: ${{ github.event.repository.name }}
  REPO_FULL_NAME: ${{ github.repository }}
  PYTHON_VERSION: "3.13"
  OWNER_PROJECT_NUMBER: 4
  HISTORIA_SPEC: historia @ git+https://github.com/CodyCBakerPhD/historia.git@59c811387b5e024395be646cdf1863e6408746ea

jobs:
  Update:
    runs-on: ubuntu-latest

    steps:
      - name: Restore repository cache
        uses: actions/cache@v4
        with:
          path: ${{ env.REPO_NAME }}
          key: repo-${{ runner.os }}-${{ github.repository }}-${{ hashFiles('.github/workflows/update.yml') }}
          restore-keys: repo-${{ runner.os }}-${{ github.repository }}-

      - name: Prepare repository
        run: |
          if [ -d "$REPO_NAME/.git" ]; then
            git -C "$REPO_NAME" fetch origin main
            git -C "$REPO_NAME" checkout main
            git -C "$REPO_NAME" reset --hard origin/main
            git -C "$REPO_NAME" clean -fd
          else
            git clone -b main https://github.com/$REPO_FULL_NAME.git
          fi
          git -C "$REPO_NAME" remote set-url origin https://github.com/$REPO_FULL_NAME.git

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('.github/workflows/update.yml') }}
          restore-keys: pip-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Run update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          python -m pip install "$HISTORIA_SPEC"

          historia data github update --directory ./work-history-data/history --username "$HISTORIA_USERNAME" --recency 2

      - name: Upload content
        run: |
          git -C $REPO_NAME add .
          git -C $REPO_NAME commit --message "update" || true  # || true in case of no changes
          git -C $REPO_NAME push https://x-access-token:${{ secrets._GITHUB_API_KEY }}@github.com/$REPO_FULL_NAME.git HEAD:main

      - name: Run minification
        run: historia minify --directory ./work-history-data/history


      - name: Upload minification
        run: |
          git -C $REPO_NAME push https://x-access-token:${{ secrets._GITHUB_API_KEY }}@github.com/$REPO_FULL_NAME.git --delete dist || true  # || true in case branch doesn't exist yet

          git -C $REPO_NAME checkout main
          git -C $REPO_NAME branch -D dist || true
          git -C $REPO_NAME checkout -b dist
          git -C $REPO_NAME add .
          git -C $REPO_NAME commit --message "update dist" || true  # || true in case of no changes
          git -C $REPO_NAME push https://x-access-token:${{ secrets._GITHUB_API_KEY }}@github.com/$REPO_FULL_NAME.git HEAD:dist

      - name: Push to GitHub project
        run: |
          OWNER_PROJECTS_BASE="https://github.com/users/$REPO_OWNER/projects"
          if [ "$REPO_OWNER_TYPE" = "Organization" ]; then
            OWNER_PROJECTS_BASE="https://github.com/orgs/$REPO_OWNER/projects"
          fi
          historia populate --directory ./work-history-data/history --project-url "$OWNER_PROJECTS_BASE/$OWNER_PROJECT_NUMBER"
          historia populate --directory ./work-history-data/history --project-url https://github.com/orgs/con/projects/6

  NotifyOnFailure:
    runs-on: ubuntu-latest
    needs: [ Update ]
    if: ${{ always() && failure() }}
    steps:
      - uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Work history data update failed"
          to: cody.c.baker.phd@gmail.com
          from: work-history-data
          body: "Please check the latest run of my work history update: ${{ github.server_url }}/${{ github.repository }}/actions/workflows/update.yml"
