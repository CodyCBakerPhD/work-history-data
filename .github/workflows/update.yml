name: Update

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets._GITHUB_API_KEY }}
  REPO_DIR: ${{ github.event.repository.name }}
  HISTORIA_SPEC: historia @ git+https://github.com/CodyCBakerPhD/historia.git@59c811387b5e024395be646cdf1863e6408746ea

jobs:
  Update:
    runs-on: ubuntu-latest

    steps:
      - name: Restore repository cache
        uses: actions/cache@v4
        with:
          path: ${{ env.REPO_DIR }}
          key: repo-${{ runner.os }}-${{ github.repository }}-${{ hashFiles('.github/workflows/update.yml') }}
          restore-keys: |
            repo-${{ runner.os }}-${{ github.repository }}-

      - name: Prepare repository
        run: |
          if [ -d "$REPO_DIR/.git" ]; then
            git -C "$REPO_DIR" fetch origin main
            git -C "$REPO_DIR" checkout main
            git -C "$REPO_DIR" reset --hard origin/main
            git -C "$REPO_DIR" clean -fd
          else
            git clone -b main https://github.com/codycbakerphd/$REPO_DIR.git
          fi
          git -C "$REPO_DIR" remote set-url origin https://github.com/codycbakerphd/$REPO_DIR.git

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.13-${{ hashFiles('.github/workflows/update.yml') }}
          restore-keys: |
            pip-${{ runner.os }}-py3.13-

      - name: Run update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          python -m pip install "$HISTORIA_SPEC"

          historia data github update --directory ./work-history-data/history --username codycbakerphd --recency 2 

      - name: Upload content
        run: |
          git -C $REPO_DIR add .
          git -C $REPO_DIR commit --message "update" || true  # || true in case of no changes
          git -C $REPO_DIR push https://x-access-token:${{ secrets._GITHUB_API_KEY }}@github.com/codycbakerphd/$REPO_DIR.git HEAD:main

      - name: Run minification
        run: historia minify --directory ./work-history-data/history


      - name: Upload minification
        run: |
          git -C $REPO_DIR push https://x-access-token:${{ secrets._GITHUB_API_KEY }}@github.com/codycbakerphd/$REPO_DIR.git --delete min || true  # || true in case branch doesn't exist yet

          git -C $REPO_DIR checkout main
          git -C $REPO_DIR branch -D min || true
          git -C $REPO_DIR checkout -b min
          git -C $REPO_DIR add .
          git -C $REPO_DIR commit --message "update min" || true  # || true in case of no changes
          git -C $REPO_DIR push https://x-access-token:${{ secrets._GITHUB_API_KEY }}@github.com/codycbakerphd/$REPO_DIR.git HEAD:min

      - name: Push to GitHub project
        run: |
          cd work-history-data
          historia populate --directory ./work-history-data/history --project-url https://github.com/users/CodyCBakerPhD/projects/4
          historia populate --directory ./work-history-data/history --project-url https://github.com/orgs/con/projects/6

  NotifyOnFailure:
    runs-on: ubuntu-latest
    needs: [ Update ]
    if: ${{ always() && failure() }}
    steps:
      - uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Work history data update failed"
          to: cody.c.baker.phd@gmail.com
          from: work-history-data
          body: "Please check the latest run of my work history update: https://github.com/codycbakerphd/work-history-data/actions/workflows/update.yml"
