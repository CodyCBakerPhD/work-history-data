name: Update

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets._GITHUB_API_KEY }}
  PYTHON_VERSION: "3.13"
  HISTORIA_SPEC: historia @ git+https://github.com/CodyCBakerPhD/historia.git@59c811387b5e024395be646cdf1863e6408746ea
  REPO_OWNER: ${{ github.repository_owner }}
  REPO_OWNER_TYPE: ${{ fromJSON('{"Organization":"orgs","User":"users"}')[github.event.repository.owner.type] || 'users' }}
  USERNAME: ${{ github.repository_owner }}
  REPO_DIR: ${{ github.event.repository.name }}
  REPO_FULL_NAME: ${{ github.repository }}
  PROJECT_NUMBER: 4

jobs:
  Update:
    runs-on: ubuntu-latest

    steps:
      - name: Restore repository cache
        uses: actions/cache@v4
        with:
          path: ${{ env.REPO_DIR }}
          key: repo-${{ runner.os }}-${{ github.repository }}-${{ hashFiles('.github/workflows/update.yml') }}
          restore-keys: repo-${{ runner.os }}-${{ github.repository }}-

      - name: Prepare repository
        run: |
          if [ -d "$REPO_DIR/.git" ]; then
            git -C "$REPO_DIR" fetch origin main
            git -C "$REPO_DIR" checkout main
            git -C "$REPO_DIR" reset --hard origin/main
            git -C "$REPO_DIR" clean -fd
          else
            git clone -b main "https://github.com/$REPO_FULL_NAME.git" "$REPO_DIR"
          fi
          git -C "$REPO_DIR" remote set-url origin https://github.com/$REPO_FULL_NAME.git

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('.github/workflows/update.yml') }}
          restore-keys: pip-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Run update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          python -m pip install "$HISTORIA_SPEC"

          historia data github update --directory ./work-history-data/history --username "$USERNAME" --recency 2

      - name: Upload new content
        run: |
          git -C "$REPO_DIR" add .
          git -C "$REPO_DIR" commit --message "update" || true  # || true in case of no changes
          git -C "$REPO_DIR" push https://x-access-token:${{ secrets._GITHUB_API_KEY }}@github.com/$REPO_FULL_NAME.git HEAD:main

      - name: Run minification
        run: historia minify --directory ./work-history-data/history

      - name: Upload minification to ephemeral branch
        run: |
          git -C "$REPO_DIR" push https://x-access-token:${{ secrets._GITHUB_API_KEY }}@github.com/$REPO_FULL_NAME.git --delete dist || true  # || true in case branch doesn't exist yet

          git -C "$REPO_DIR" checkout main
          git -C "$REPO_DIR" branch -D dist || true
          git -C "$REPO_DIR" checkout -b dist
          git -C "$REPO_DIR" add .
          git -C "$REPO_DIR" commit --message "update dist" || true  # || true in case of no changes
          git -C "$REPO_DIR" push https://x-access-token:${{ secrets._GITHUB_API_KEY }}@github.com/$REPO_FULL_NAME.git HEAD:dist

      - name: Push to GitHub project
        run: |
          OWNER_PROJECT_URL="https://github.com/$REPO_OWNER_TYPE/$REPO_OWNER/projects/$PROJECT_NUMBER"
          historia populate --directory ./work-history-data/history --project-url "$OWNER_PROJECT_URL"
          historia populate --directory ./work-history-data/history --project-url https://github.com/orgs/con/projects/6

  NotifyOnFailure:
    runs-on: ubuntu-latest
    needs: [ Update ]
    if: ${{ always() && failure() }}
    steps:
      - uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Work history data update failed"
          to: cody.c.baker.phd@gmail.com
          from: work-history-data
          body: "Please check the latest run of my work history update: https://github.com/codycbakerphd/work-history-data/actions/workflows/update.yml"
