name: Move DONE to History

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"
  HISTORIA_SPEC: historia==0.10.8
  GITHUB_TOKEN: ${{ secrets._GITHUB_API_KEY }}

jobs:
  Transition:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Get exact Python version
        id: python-version
        run: echo "value=$(python --version | cut -d' ' -f2)" >> "$GITHUB_OUTPUT"

      - name: Restore pip cache
        id: pip-cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.local
          key: pip-${{ runner.os }}-py${{ steps.python-version.outputs.value }}-${{ env.HISTORIA_SPEC }}

      - name: Install historia
        if: steps.pip-cache.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install --user "$HISTORIA_SPEC"

      - name: Add user-local bin to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run transition
        run: historia project transition --url https://github.com/orgs/con/projects/6 --current DONE --new History

  NotifyOnFailure:
    runs-on: ubuntu-latest
    needs: [ Transition ]
    if: ${{ always() && failure() }}
    steps:
      - uses: dawidd6/action-send-mail@v18
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Work history data update failed"
          to: cody.c.baker.phd@gmail.com
          from: work-history-data <${{ secrets.MAIL_USERNAME }}>
          body: "Please check the latest run of my work history update: https://github.com/codycbakerphd/work-history-data/actions/workflows/update.yml"
